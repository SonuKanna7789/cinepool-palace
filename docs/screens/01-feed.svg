<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="poster1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d2f5c"/><stop offset="1" stop-color="#1a1430"/>
    </linearGradient>
    <linearGradient id="poster2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5c2f33"/><stop offset="1" stop-color="#2a1416"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" rx="48" fill="#0B0B10"/>
  <rect x="0.5" y="0.5" width="389" height="843" rx="47.5" fill="none" stroke="#272733"/>
  <rect x="135" y="16" width="120" height="30" rx="15" fill="#000"/>
  <text x="24" y="92" fill="#F4F4F8" font-size="28" font-weight="800">Feed</text>

  <!-- scope chips -->
  <rect x="24" y="112" width="92" height="32" rx="16" fill="#F6C453"/>
  <text x="70" y="133" fill="#1A1404" font-size="13" font-weight="700" text-anchor="middle">Everyone</text>
  <rect x="124" y="112" width="92" height="32" rx="16" fill="#15151D" stroke="#272733"/>
  <text x="170" y="133" fill="#9B9BAC" font-size="13" font-weight="600" text-anchor="middle">Following</text>

  <!-- review card 1 -->
  <rect x="16" y="164" width="358" height="216" rx="18" fill="#15151D" stroke="#272733"/>
  <circle cx="56" cy="202" r="19" fill="#F6C453"/>
  <text x="56" y="207" fill="#0B0B10" font-size="13" font-weight="800" text-anchor="middle">PK</text>
  <text x="86" y="198" fill="#F4F4F8" font-size="15" font-weight="700">Pauline K.</text>
  <text x="86" y="215" fill="#9B9BAC" font-size="12">2h · on Cinema</text>
  <text x="358" y="206" fill="#F6C453" font-size="14" text-anchor="end">★★★★★</text>
  <rect x="40" y="238" width="76" height="114" rx="8" fill="url(#poster1)"/>
  <text x="132" y="258" fill="#F4F4F8" font-size="16" font-weight="700">Dune: Part Two</text>
  <text x="132" y="277" fill="#9B9BAC" font-size="12">Sci-Fi · Adventure · Drama</text>
  <text x="132" y="302" fill="#9B9BAC" font-size="13" font-style="italic">“Villeneuve understood the</text>
  <text x="132" y="320" fill="#9B9BAC" font-size="13" font-style="italic">assignment. See it on the</text>
  <text x="132" y="338" fill="#9B9BAC" font-size="13" font-style="italic">biggest screen you can find.”</text>

  <!-- review card 2 -->
  <rect x="16" y="396" width="358" height="216" rx="18" fill="#15151D" stroke="#272733"/>
  <circle cx="56" cy="434" r="19" fill="#4FD8C4"/>
  <text x="56" y="439" fill="#0B0B10" font-size="13" font-weight="800" text-anchor="middle">AR</text>
  <text x="86" y="430" fill="#F4F4F8" font-size="15" font-weight="700">Arjun R.</text>
  <text x="86" y="447" fill="#9B9BAC" font-size="12">6h · on Netflix</text>
  <text x="358" y="438" fill="#F6C453" font-size="14" text-anchor="end">★★★★☆</text>
  <rect x="40" y="470" width="76" height="114" rx="8" fill="url(#poster2)"/>
  <text x="132" y="490" fill="#F4F4F8" font-size="16" font-weight="700">Past Lives</text>
  <text x="132" y="509" fill="#9B9BAC" font-size="12">Drama · Romance</text>
  <text x="132" y="534" fill="#9B9BAC" font-size="13" font-style="italic">“Quiet, devastating, perfect.</text>
  <text x="132" y="552" fill="#9B9BAC" font-size="13" font-style="italic">In-yun will haunt me for weeks.”</text>

  <!-- card 3 peek -->
  <rect x="16" y="628" width="358" height="120" rx="18" fill="#15151D" stroke="#272733"/>
  <circle cx="56" cy="666" r="19" fill="#FF5C72"/>
  <text x="56" y="671" fill="#0B0B10" font-size="13" font-weight="800" text-anchor="middle">MS</text>
  <text x="86" y="662" fill="#F4F4F8" font-size="15" font-weight="700">Meera S.</text>
  <text x="86" y="679" fill="#9B9BAC" font-size="12">1d · on Prime Video</text>
  <text x="358" y="670" fill="#F6C453" font-size="14" text-anchor="end">★★★☆☆</text>

  <!-- tab bar -->
  <rect x="0" y="764" width="390" height="80" fill="#0B0B10"/>
  <line x1="0" y1="764" x2="390" y2="764" stroke="#272733"/>
  <text x="39" y="794" fill="#F6C453" font-size="19" text-anchor="middle">🎬</text>
  <text x="39" y="812" fill="#F6C453" font-size="10" font-weight="700" text-anchor="middle">Feed</text>
  <text x="117" y="794" font-size="19" text-anchor="middle" opacity="0.35">🧭</text>
  <text x="117" y="812" fill="#62626F" font-size="10" text-anchor="middle">Discover</text>
  <text x="195" y="794" font-size="19" text-anchor="middle" opacity="0.35">👥</text>
  <text x="195" y="812" fill="#62626F" font-size="10" text-anchor="middle">Crews</text>
  <text x="273" y="794" font-size="19" text-anchor="middle" opacity="0.35">🎟️</text>
  <text x="273" y="812" fill="#62626F" font-size="10" text-anchor="middle">Screenings</text>
  <text x="351" y="794" font-size="19" text-anchor="middle" opacity="0.35">👤</text>
  <text x="351" y="812" fill="#62626F" font-size="10" text-anchor="middle">Profile</text>
</svg>
