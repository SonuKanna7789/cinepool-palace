<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6b5430"/><stop offset="1" stop-color="#282012"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#306b69"/><stop offset="1" stop-color="#122828"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6b3055"/><stop offset="1" stop-color="#281220"/></linearGradient>
  </defs>
  <rect width="390" height="844" rx="48" fill="#0B0B10"/>
  <rect x="0.5" y="0.5" width="389" height="843" rx="47.5" fill="none" stroke="#272733"/>
  <rect x="135" y="16" width="120" height="30" rx="15" fill="#000"/>
  <text x="24" y="92" fill="#F4F4F8" font-size="28" font-weight="800">Screenings</text>
  <text x="24" y="120" fill="#9B9BAC" font-size="13">Rally votes for the films you want back on the big</text>
  <text x="24" y="138" fill="#9B9BAC" font-size="13">screen — then take the demand to your local cinema.</text>

  <!-- request 1 -->
  <rect x="16" y="158" width="358" height="116" rx="18" fill="#15151D" stroke="#272733"/>
  <rect x="32" y="174" width="56" height="84" rx="8" fill="url(#s1)"/>
  <text x="102" y="194" fill="#F4F4F8" font-size="15" font-weight="700">Interstellar (IMAX 70mm)</text>
  <text x="318" y="193" fill="#F6C453" font-size="10" font-weight="800" text-anchor="end">OPEN</text>
  <text x="102" y="214" fill="#9B9BAC" font-size="12">🎦 Prasads Multiplex, Hyderabad</text>
  <text x="102" y="234" fill="#9B9BAC" font-size="12" font-style="italic">10th anniversary. It belongs in IMAX.</text>
  <rect x="306" y="200" width="52" height="58" rx="12" fill="#F6C453"/>
  <text x="332" y="226" font-size="18" text-anchor="middle">🔥</text>
  <text x="332" y="248" fill="#1A1404" font-size="13" font-weight="800" text-anchor="middle">128</text>

  <!-- request 2 -->
  <rect x="16" y="286" width="358" height="116" rx="18" fill="#15151D" stroke="#272733"/>
  <rect x="32" y="302" width="56" height="84" rx="8" fill="url(#s2)"/>
  <text x="102" y="322" fill="#F4F4F8" font-size="15" font-weight="700">Spirited Away</text>
  <text x="338" y="321" fill="#5BD9A4" font-size="10" font-weight="800" text-anchor="end">SCREENING!</text>
  <text x="102" y="342" fill="#9B9BAC" font-size="12">🎦 PVR Forum Mall, Bengaluru</text>
  <text x="102" y="362" fill="#9B9BAC" font-size="12" font-style="italic">Studio Ghibli on the big screen, subbed.</text>
  <rect x="306" y="328" width="52" height="58" rx="12" fill="#F6C453"/>
  <text x="332" y="354" font-size="18" text-anchor="middle">🔥</text>
  <text x="332" y="376" fill="#1A1404" font-size="13" font-weight="800" text-anchor="middle">94</text>

  <!-- request 3 -->
  <rect x="16" y="414" width="358" height="116" rx="18" fill="#15151D" stroke="#272733"/>
  <rect x="32" y="430" width="56" height="84" rx="8" fill="url(#s3)"/>
  <text x="102" y="450" fill="#F4F4F8" font-size="15" font-weight="700">In the Mood for Love</text>
  <text x="318" y="449" fill="#F6C453" font-size="10" font-weight="800" text-anchor="end">OPEN</text>
  <text x="102" y="470" fill="#9B9BAC" font-size="12">🎦 Regal Cinema, Mumbai</text>
  <text x="102" y="490" fill="#9B9BAC" font-size="12" font-style="italic">Wong Kar-wai retrospective opener?</text>
  <rect x="306" y="456" width="52" height="58" rx="12" fill="none" stroke="#F6C453"/>
  <text x="332" y="482" font-size="18" text-anchor="middle" opacity="0.7">🔥</text>
  <text x="332" y="504" fill="#F6C453" font-size="13" font-weight="800" text-anchor="middle">41</text>

  <!-- FAB -->
  <circle cx="334" cy="708" r="28" fill="#F6C453"/>
  <text x="334" y="718" fill="#1A1404" font-size="28" font-weight="700" text-anchor="middle">+</text>

  <!-- tab bar -->
  <rect x="0" y="764" width="390" height="80" fill="#0B0B10"/>
  <line x1="0" y1="764" x2="390" y2="764" stroke="#272733"/>
  <text x="39" y="794" font-size="19" text-anchor="middle" opacity="0.35">🎬</text>
  <text x="39" y="812" fill="#62626F" font-size="10" text-anchor="middle">Feed</text>
  <text x="117" y="794" font-size="19" text-anchor="middle" opacity="0.35">🧭</text>
  <text x="117" y="812" fill="#62626F" font-size="10" text-anchor="middle">Discover</text>
  <text x="195" y="794" font-size="19" text-anchor="middle" opacity="0.35">👥</text>
  <text x="195" y="812" fill="#62626F" font-size="10" text-anchor="middle">Crews</text>
  <text x="273" y="794" fill="#F6C453" font-size="19" text-anchor="middle">🎟️</text>
  <text x="273" y="812" fill="#F6C453" font-size="10" font-weight="700" text-anchor="middle">Screenings</text>
  <text x="351" y="794" font-size="19" text-anchor="middle" opacity="0.35">👤</text>
  <text x="351" y="812" fill="#62626F" font-size="10" text-anchor="middle">Profile</text>
</svg>
